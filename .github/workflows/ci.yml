name: Tests & Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt6 reportlab pytest
          
      - name: Run tests
        run: |
          cd calcElec
          python -m pytest ../tests/ -v --tb=short
          
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 calcElec/ --count --select=E9,F63,F7,F82 --show-source --statistics
          
  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install PyInstaller
        run: pip install pyinstaller
        
      - name: Build executable
        run: |
          cd calcElec
          pyinstaller main.py --name CalcElec --onefile --windowed --clean
          
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: CalcElec
          path: calcElec/dist/CalcElec.exe
